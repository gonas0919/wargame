services:
  nginx:
    image: nginx:1.27-alpine
    container_name: web2-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: web2-backend
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ctf
      MYSQL_PASSWORD: ctfpass
      MYSQL_DATABASE: jwt_portal
      FLASK_SECRET_KEY: flask-session-secret
      JWT_SECRET: dev_backup_jwt_secret_2026
      JWT_ALGORITHM: HS256
      JWT_EXPIRES_HOURS: "24"
      FLAG_PATH: /flag.txt
    volumes:
      - ./flag.txt:/flag.txt:ro
      - ./backend/dev_backup:/app/dev_backup:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5020/api/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: web2-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: jwt_portal
      MYSQL_USER: ctf
      MYSQL_PASSWORD: ctfpass
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data:
