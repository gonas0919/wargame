services:
  nginx:
    image: nginx:1.27-alpine
    container_name: mju-web1-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  frontend:
    build:
      context: ./frontend
    container_name: mju-web1-frontend

  backend:
    build:
      context: ./backend
    container_name: mju-web1-backend
    depends_on:
      - db
    volumes:
      - ./flag.txt:/flag.txt:ro
    environment:
      FLAG_PATH: /flag.txt
      MYSQL_HOST: db
      MYSQL_USER: ctf
      MYSQL_PASSWORD: ctfpass
      MYSQL_DATABASE: mju_web1

  db:
    image: mysql:8.4
    container_name: mju-web1-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mju_web1
      MYSQL_USER: ctf
      MYSQL_PASSWORD: ctfpass
